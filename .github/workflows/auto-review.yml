name: Auto PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-review:
    name: Automated Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          DIFF_COUNT=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Changed files: $DIFF_COUNT"
          if [ "$DIFF_COUNT" -gt 20 ]; then
            echo "::warning::PR 过大 (>20 个文件变更)，建议拆分为更小的 PR"
          fi

      - name: Check go.mod/go.sum consistency
        run: |
          go mod tidy -diff 2>&1 | tee tidy.log
          if [ -s tidy.log ]; then
            echo "::error::go.mod/go.sum 不一致，请运行 'go mod tidy'"
            exit 1
          fi

      - name: Check for leftover debug prints
        run: |
          if grep -rn "fmt\.Println\|fmt\.Printf\|log\.Print" --include="*.go" . \
            --exclude-dir=vendor --exclude-dir=.git 2>/dev/null | \
            grep -v "_test.go"; then
            echo "::warning::发现残留的调试输出，建议替换为结构化日志"
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false
