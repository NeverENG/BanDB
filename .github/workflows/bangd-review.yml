name: BanGD PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: NeverENG/BanGD-AI-PR-Review-Tool@70740458e4e9698803ec624cd60ce62254a04c5a # v1.0.0
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK }}
          github_token: ${{ github.token }}
          model: deepseek-chat
          base_url: https://api.deepseek.com/anthropic
