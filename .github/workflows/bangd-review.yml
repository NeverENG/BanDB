name: BanGD PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: NeverENG/BanGD-AI-PR-Review-Tool@f23ddcc68c1e851a7e700a3c907854afff7ce13f
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK }}
          github_token: ${{ github.token }}
          model: deepseek-chat
          base_url: https://api.deepseek.com/anthropic
