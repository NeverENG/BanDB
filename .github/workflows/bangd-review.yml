name: BanGD PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: NeverENG/BanGD-AI-PR-Review-Tool@aa60007cde29e62e3085c435f40167f839469874 # main 最新 (v1/v1.0.0 tag 落后于 main)
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK }}
          github_token: ${{ github.token }}
          model: deepseek-chat
          base_url: https://api.deepseek.com/anthropic
